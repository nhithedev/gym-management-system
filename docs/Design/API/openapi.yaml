openapi: 3.0.3
info:
  title: Gym Management System API
  version: 1.0.2
  description: |
    OpenAPI 3.0 contract cho Module 1 Auth + Module 2 RBAC + Module 3 Package + Module 4 Member/Subscription/Payment + Module 6 Facility.
    Module 7 Training va Module 8 Feedback da detailed o Markdown spec, nhung OpenAPI paths pending sync sau doc review.
    Module 5 Staff va Module 9 Report defer session sau.
    Source-of-truth conventions: [docs/Design/API/conventions.md](./conventions.md).
    Source-of-truth error envelope: server/src/common/filters/http-exception.filter.ts.
  contact:
    name: Lê Thanh An
servers:
  - url: /api/v1
    description: Base URL (global prefix set in server/src/main.ts)

tags:
  - name: Auth
    description: Module 1 — Authentication (UC00, UC01, UC02, UC13).
  - name: Members
    description: Module 4 — Hội viên (UC03A, UC03B, UC11).
  - name: Subscriptions
    description: Module 4 — Lượt đăng ký gói (UC04A, UC04B).
  - name: Payments
    description: Module 4 — Thanh toán.
  - name: Permissions
    description: Module 2 — Permission catalog (read-only).
  - name: Groups
    description: Module 2 — Group + permission assignment.
  - name: Users
    description: Module 2 — User admin (UC10).
  - name: Packages
    description: Module 3 — Gói tập (UC03A/UC04A/UC10).
  - name: Rooms
    description: Module 6 — Phòng tập (UC08).
  - name: Equipment
    description: Module 6 — Thiết bị (UC09).
  - name: Maintenance
    description: Module 6 — Nhật ký bảo trì (UC09).

security:
  - BearerAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: UC00 — Đăng nhập
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginBody' }
            example:
              email: owner@gym.local
              password: Password123!
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/LoginResult' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/logout:
    post:
      tags: [Auth]
      summary: UC01 — Đăng xuất (client-side token discard)
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { message: { type: string } }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/me:
    get:
      tags: [Auth]
      summary: Lấy thông tin user hiện tại
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/UserProfile' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: UC02 — Quên mật khẩu (gửi OTP)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordBody' }
            example: { email: owner@gym.local }
      responses:
        '200':
          description: Anti-enumeration — luôn 200 OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { message: { type: string } }
              example:
                success: true
                message: Nếu email tồn tại trong hệ thống, mã OTP đã được gửi
        '400': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimit' }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: UC02 — Đặt lại mật khẩu bằng OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordBody' }
            example:
              email: owner@gym.local
              otp: '123456'
              newPassword: NewPass123!
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { message: { type: string } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: UC13 — Xác thực email bằng OTP
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyEmailBody' }
            example:
              email: newmember@gym.local
              otp: '654321'
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { message: { type: string } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: EMAIL_ALREADY_VERIFIED
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              example: { success: false, code: EMAIL_ALREADY_VERIFIED, message: Email đã được xác thực }
        '410':
          description: OTP_EXPIRED
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
              example: { success: false, code: OTP_EXPIRED, message: Mã OTP đã hết hạn }

  /auth/resend-verify:
    post:
      tags: [Auth]
      summary: UC13 — Gửi lại email xác thực
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordBody' }
            example: { email: newmember@gym.local }
      responses:
        '200':
          description: Anti-enumeration — luôn 200 OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { message: { type: string } }
        '400': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/RateLimit' }

  /members:
    get:
      tags: [Members]
      summary: UC11 — List hội viên
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { name: sort, in: query, schema: { type: string, default: created_at:desc } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/UserStatus' } }
        - { name: trainerId, in: query, schema: { type: string } }
        - { name: search, in: query, schema: { type: string } }
        - { name: includeDeleted, in: query, schema: { type: boolean, default: false }, description: Chỉ Owner }
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Member' }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Members]
      summary: UC03A — Staff tạo hội viên tại quầy
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateMemberBody' }
      responses:
        '201':
          description: Tạo thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Member' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500':
          description: MEMBER_CODE_GENERATION_FAILED
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /members/self-register:
    post:
      tags: [Members]
      summary: UC03B — Member tự đăng ký online
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SelfRegisterMemberBody' }
      responses:
        '201':
          description: Tạo thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MemberWithPendingSubscription' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '409': { $ref: '#/components/responses/Conflict' }

  /members/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdParam' }
    get:
      tags: [Members]
      summary: Chi tiết hội viên
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Member' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Members]
      summary: Cập nhật profile hội viên (Self chỉ subset field)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateMemberBody' }
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Member' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Members]
      summary: Xóa hội viên (soft-delete, Owner only)
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties: { message: { type: string } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /members/{id}/assign-trainer:
    parameters:
      - { $ref: '#/components/parameters/IdParam' }
    patch:
      tags: [Members]
      summary: UC11 — Gán PT chính
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignTrainerBody' }
            example: { trainerId: '3' }
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          memberId: { type: string }
                          primaryTrainerId: { type: string, nullable: true }
                          primaryTrainerName: { type: string, nullable: true }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /members/{id}/progress:
    parameters:
      - { $ref: '#/components/parameters/IdParam' }
    get:
      tags: [Members]
      summary: UC06 — List bản ghi tiến độ
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { name: sort, in: query, schema: { type: string, default: recorded_at:desc } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/MemberProgress' }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /subscriptions:
    get:
      tags: [Subscriptions]
      summary: List lượt đăng ký gói
      parameters:
        - { name: memberId, in: query, schema: { type: string }, description: Self bắt buộc set memberId=self }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/SubscriptionStatus' } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { name: sort, in: query, schema: { type: string, default: start_date:desc } }
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Subscription' }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Subscriptions]
      summary: UC03A/B / UC04A — Tạo subscription mới (purchase hoặc renewal)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateSubscriptionBody' }
            example: { memberId: '5', packageId: '3' }
      responses:
        '201':
          description: Tạo thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Subscription' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: FORBIDDEN hoặc EMAIL_NOT_VERIFIED
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: SUBSCRIPTION_ALREADY_PENDING hoặc DUPLICATE_VALUE
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /subscriptions/{id}:
    parameters:
      - { $ref: '#/components/parameters/IdParam' }
    get:
      tags: [Subscriptions]
      summary: Chi tiết subscription
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SubscriptionWithPackage' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /subscriptions/{id}/cancel:
    parameters:
      - { $ref: '#/components/parameters/IdParam' }
    patch:
      tags: [Subscriptions]
      summary: UC04B — Hủy subscription (cascade activate pending nếu có)
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CancelSubscriptionBody' }
            example: { reason: Member chuyển nơi ở }
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/CancelSubscriptionResult' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: SUBSCRIPTION_NOT_CANCELLABLE
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /payments:
    get:
      tags: [Payments]
      summary: List payments
      parameters:
        - { name: memberId, in: query, schema: { type: string }, description: Self bắt buộc set memberId=self }
        - { name: subscriptionId, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/PaymentStatus' } }
        - { name: method, in: query, schema: { $ref: '#/components/schemas/PaymentMethod' } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/PageSize' }
        - { name: sort, in: query, schema: { type: string, default: paid_at:desc } }
      responses:
        '200':
          description: Thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Payment' }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Payments]
      summary: Ghi nhận thanh toán (activate subscription nếu success + start_date <= today_vn)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePaymentBody' }
      responses:
        '201':
          description: Tạo thành công
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PaymentWithSubscription' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: DUPLICATE_VALUE hoặc SUBSCRIPTION_NOT_PENDING
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # =========================================
  # Module 2 — RBAC + User Admin
  # =========================================

  /permissions:
    get:
      tags: [Permissions]
      summary: List permission catalog
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - { name: resource, in: query, schema: { type: string }, description: Filter `code` LIKE `<resource>.%` }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Permission' }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /permissions/{id}:
    get:
      tags: [Permissions]
      summary: Detail permission
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/Permission' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /groups:
    get:
      tags: [Groups]
      summary: List group
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - { name: search, in: query, schema: { type: string } }
        - { name: includeDeleted, in: query, schema: { type: boolean, default: false } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/GroupSummary' }
                      meta: { $ref: '#/components/schemas/PaginationMeta' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Groups]
      summary: Tạo custom group
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateGroupBody' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/GroupDetail' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /groups/{id}:
    get:
      tags: [Groups]
      summary: Detail group + permissions
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/GroupDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Groups]
      summary: Update group name/description
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateGroupBody' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessEnvelope'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/GroupDetail' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
