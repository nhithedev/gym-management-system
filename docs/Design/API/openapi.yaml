  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema: { type: string }
      description: BigInt PK serialized as string.
    Page:
      name: page
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, default: 20, minimum: 1, maximum: 100 }

  schemas:
    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success: { type: boolean, enum: [true] }
        message: { type: string }

    ErrorEnvelope:
      type: object
      required: [success, code, message]
      properties:
        success: { type: boolean, enum: [false] }
        code: { type: string, example: VALIDATION_ERROR }
        message: { type: string }
        details:
          oneOf:
            - { type: array, items: { type: string } }
            - { type: object, additionalProperties: true }

    PaginationMeta:
      type: object
      required: [page, pageSize, totalItems, totalPages]
      properties:
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        totalItems: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }

    UserStatus:
      type: string
      enum: [pending_verification, active, locked]

    SubscriptionStatus:
      type: string
      enum: [pending, active, expired, cancelled]

    PaymentStatus:
      type: string
      enum: [success, failed]

    PaymentMethod:
      type: string
      enum: [cash, bank_card, ewallet]

    UserProfile:
      type: object
      required: [userId, email, fullName, status, roles]
      properties:
        userId: { type: string }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        fullName: { type: string }
        status: { $ref: '#/components/schemas/UserStatus' }
        roles:
          type: array
          items: { type: string, enum: [owner, staff, pt, member] }

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }

    LoginResult:
      type: object
      required: [accessToken, user]
      properties:
        accessToken: { type: string }
        user:
          type: object
          required: [userId, email, fullName, roles]
          properties:
            userId: { type: string }
            email: { type: string, format: email }
            fullName: { type: string }
            roles:
              type: array
              items: { type: string }

    ForgotPasswordBody:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    ResetPasswordBody:
      type: object
      required: [email, otp, newPassword]
      properties:
        email: { type: string, format: email }
        otp: { type: string, minLength: 6, maxLength: 10 }
        newPassword: { type: string, minLength: 8 }

    VerifyEmailBody:
      type: object
      required: [email, otp]
      properties:
        email: { type: string, format: email }
        otp: { type: string, minLength: 6, maxLength: 6 }

    Member:
      type: object
      required: [memberId, memberCode, userId, email, fullName, status, createdAt]
      properties:
        memberId: { type: string }
        memberCode: { type: string, example: MEM-2026-000005 }
        userId: { type: string }
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        fullName: { type: string }
        status: { $ref: '#/components/schemas/UserStatus' }
        emailVerifiedAt: { type: string, format: date-time, nullable: true }
        dateOfBirth: { type: string, format: date, nullable: true }
        address: { type: string, nullable: true }
        primaryTrainerId: { type: string, nullable: true }
        avatarFileId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CreateMemberBody:
      type: object
      required: [email, password, fullName]
      properties:
        email: { type: string, format: email }
        phone: { type: string, nullable: true }
        password: { type: string, minLength: 8 }
        fullName: { type: string, minLength: 2, maxLength: 200 }
        dateOfBirth: { type: string, format: date, nullable: true }
        address: { type: string, maxLength: 200, nullable: true }

    SelfRegisterMemberBody:
      allOf:
        - $ref: '#/components/schemas/CreateMemberBody'
        - type: object
          properties:
            packageId: { type: string, nullable: true, description: FK packages.package_id }
          required: [phone]

    UpdateMemberBody:
      type: object
      description: |
        Self chỉ được set [fullName, phone, dateOfBirth, address]. Staff/Owner mở rộng (trừ system-managed).
        primaryTrainerId KHÔNG cho phép — dùng /assign-trainer endpoint.
      properties:
        fullName: { type: string, minLength: 2, maxLength: 200 }
        phone: { type: string }
        dateOfBirth: { type: string, format: date, nullable: true }
        address: { type: string, maxLength: 200, nullable: true }

    AssignTrainerBody:
      type: object
      required: [trainerId]
      properties:
        trainerId:
          type: string
          nullable: true
          description: FK staff.staff_id (position=pt), hoặc null để bỏ gán.

    MemberWithPendingSubscription:
      description: |
        Member shape kèm subscription pending nếu request có packageId.
        Khi không có packageId, field `subscription` được omit khỏi response (không gửi null).
      allOf:
        - $ref: '#/components/schemas/Member'
        - type: object
          properties:
            subscription:
              $ref: '#/components/schemas/Subscription'

    MemberProgress:
      type: object
      required: [progressId, memberId, staffId, recordedAt]
      properties:
        progressId: { type: string }
        memberId: { type: string }
        staffId: { type: string }
        staffName: { type: string }
        weight: { type: string, description: Decimal as string, example: '65.50' }
        bmi: { type: string, example: '22.10' }
        goal: { type: string, nullable: true }
        notes: { type: string, nullable: true }
        recordedAt: { type: string, format: date-time }

    Subscription:
      type: object
      required: [subscriptionId, memberId, packageId, startDate, endDate, status, createdAt]
      properties:
        subscriptionId: { type: string }
        memberId: { type: string }
        memberCode: { type: string }
        packageId: { type: string }
        packageName: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        status: { $ref: '#/components/schemas/SubscriptionStatus' }
        cancelledAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    SubscriptionWithPackage:
      allOf:
        - $ref: '#/components/schemas/Subscription'
        - type: object
          properties:
            package:
              type: object
              required: [packageId, packageCode, name, durationDays, price]
              properties:
                packageId: { type: string }
                packageCode: { type: string, example: PKG-0003 }
                name: { type: string }
                durationDays: { type: integer, minimum: 1 }
                price: { type: string, example: '3000000.00' }

    CreateSubscriptionBody:
      type: object
      required: [memberId, packageId]
      properties:
        memberId: { type: string }
        packageId: { type: string }

    CancelSubscriptionBody:
      type: object
      properties:
        reason: { type: string, maxLength: 500 }

    CancelSubscriptionResult:
      type: object
      required: [cancelledSubscription]
      properties:
        cancelledSubscription:
          type: object
          required: [subscriptionId, status, cancelledAt]
          properties:
            subscriptionId: { type: string }
            status: { type: string, enum: [cancelled] }
            cancelledAt: { type: string, format: date-time }
        activatedSubscription:
          nullable: true
          type: object
          properties:
            subscriptionId: { type: string }
            status: { type: string, enum: [active] }
            startDate: { type: string, format: date }
            endDate: { type: string, format: date }

    Payment:
      type: object
      required: [paymentId, memberId, subscriptionId, amount, method, status, paidAt]
      properties:
        paymentId: { type: string }
        memberId: { type: string }
        subscriptionId: { type: string }
        amount: { type: string, example: '3000000.00' }
        method: { $ref: '#/components/schemas/PaymentMethod' }
        transactionReference: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/PaymentStatus' }
        paidAt: { type: string, format: date-time }

    CreatePaymentBody:
      type: object
      required: [memberId, subscriptionId, amount, method]
      properties:
        memberId: { type: string }
        subscriptionId: { type: string }
        amount: { type: string, description: Decimal VND integer, example: '3000000.00' }
        method: { $ref: '#/components/schemas/PaymentMethod' }
        transactionReference: { type: string, nullable: true, description: Bắt buộc khi method != cash. }
        status: { $ref: '#/components/schemas/PaymentStatus', default: success }

    PaymentWithSubscription:
      allOf:
        - $ref: '#/components/schemas/Payment'
        - type: object
          properties:
            subscription:
              type: object
              properties:
                subscriptionId: { type: string }
                status: { $ref: '#/components/schemas/SubscriptionStatus' }
                startDate: { type: string, format: date }
                endDate: { type: string, format: date }

    # ========================================
    # Module 2 — RBAC + User Admin schemas
    # ========================================

    Permission:
      type: object
      required: [permissionId, code, name]
      properties:
        permissionId: { type: string }
        code: { type: string, example: member.read }
        name: { type: string, example: Xem hoi vien }
        description: { type: string }

    GroupSummary:
      type: object
      required: [groupId, name]
      properties:
        groupId: { type: string }
        name: { type: string, example: staff }
        description: { type: string }
        memberCount: { type: integer, description: Count user_groups }
        permissionCount: { type: integer }
        createdAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    GroupDetail:
      allOf:
        - $ref: '#/components/schemas/GroupSummary'
        - type: object
          properties:
            permissions:
              type: array
              items: { $ref: '#/components/schemas/Permission' }

    CreateGroupBody:
      type: object
      required: [name, description]
      properties:
        name: { type: string, pattern: '^[a-z][a-z0-9_]{1,49}$', description: UNIQUE; không trùng system group }
        description: { type: string, minLength: 10, maxLength: 500 }
        permissions:
          type: array
          items: { type: string }
          description: Mảng permission codes.

    UpdateGroupBody:
      type: object
      properties:
        name: { type: string, pattern: '^[a-z][a-z0-9_]{1,49}$' }
        description: { type: string, minLength: 10, maxLength: 500 }

    UserSummary:
      type: object
      required: [userId, email, status]
      properties:
        userId: { type: string }
        email: { type: string, format: email }
        fullName: { type: string }
        phone: { type: string }
        status: { $ref: '#/components/schemas/UserStatus' }
        emailVerifiedAt: { type: string, format: date-time, nullable: true }
        roles:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    UserDetail:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          properties:
            avatarFileId: { type: string, nullable: true }
            groups:
              type: array
              items:
                type: object
                properties:
                  groupId: { type: string }
                  name: { type: string }
            member: { $ref: '#/components/schemas/MemberProfileNested' }
            staff: { $ref: '#/components/schemas/StaffProfileNested' }

    MemberProfileNested:
      type: object
      nullable: true
      properties:
        memberId: { type: string }
        memberCode: { type: string }
        dateOfBirth: { type: string, format: date }
        primaryTrainerId: { type: string, nullable: true }

    StaffProfileNested:
      type: object
      nullable: true
      properties:
        staffId: { type: string }
        staffCode: { type: string }
        position: { type: string }

    UpdateUserBody:
      type: object
      properties:
        fullName: { type: string, maxLength: 255 }
        phone: { type: string, pattern: '^0\d{9,10}$' }
        status:
          type: string
          enum: [active, pending_verification]
          description: 'Admin only. `locked` MUST NOT set v1.0.'
        avatarFileId: { type: string }

    UserGroupAssignment:
      type: object
      required: [groupId, name]
      properties:
        groupId: { type: string }
        name: { type: string }
        description: { type: string }
        assignedAt: { type: string, format: date-time }
        permissionCount: { type: integer }

    # ========================================
    # Module 3 — Package schemas
    # ========================================

    PackageStatus:
      type: string
      enum: [active, inactive]

    Package:
      type: object
      required: [packageId, packageCode, name, durationDays, price, status]
      properties:
        packageId: { type: string }
        packageCode: { type: string, pattern: '^PKG-[A-Z0-9]{4}$' }
        name: { type: string, maxLength: 100 }
        durationDays: { type: integer, minimum: 1, maximum: 3650 }
        price: { type: string, format: decimal, example: '500000.00' }
        benefits: { type: string, nullable: true, maxLength: 255 }
        status: { $ref: '#/components/schemas/PackageStatus' }
        createdAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }

    PackageWithStats:
      allOf:
        - $ref: '#/components/schemas/Package'
        - type: object
          properties:
            stats:
              type: object
              nullable: true
              description: Chỉ trả khi caller có `package.manage`.
              properties:
                activeSubscriptions: { type: integer }
                pendingSubscriptions: { type: integer }
                totalSubscriptions: { type: integer }

    CreatePackageBody:
      type: object
      required: [name, durationDays, price]
      properties:
        packageCode: { type: string, pattern: '^PKG-[A-Z0-9]{4}$', description: Auto-gen nếu omit. }
        name: { type: string, minLength: 1, maxLength: 100 }
        durationDays: { type: integer, minimum: 1, maximum: 3650 }
        price: { type: string, format: decimal, description: '> 0, ≤ 99,999,999.99' }
        benefits: { type: string, maxLength: 255 }
        status: { $ref: '#/components/schemas/PackageStatus' }

    UpdatePackageBody:
      type: object
      description: '`durationDays` và `price` block nếu có sub active/pending.'
      properties:
        packageCode: { type: string, pattern: '^PKG-[A-Z0-9]{4}$' }
        name: { type: string, minLength: 1, maxLength: 100 }
        durationDays: { type: integer, minimum: 1, maximum: 3650 }
        price: { type: string, format: decimal }
        benefits: { type: string, maxLength: 255 }
        status: { $ref: '#/components/schemas/PackageStatus' }

    EquipmentStatus:
      type: string
      enum: [active, broken, repairing, retired]

    MaintenanceStatus:
      type: string
      enum: [reported, repairing, resolved, failed]

    Room:
      type: object
      required: [roomId, roomCode, name, capacity]
      properties:
        roomId: { type: string }
        roomCode: { type: string, pattern: '^RM-[0-9]{3}$' }
        name: { type: string }
        roomType: { type: string }
        capacity: { type: integer }
        description: { type: string }

    RoomWithStats:
      allOf:
        - $ref: '#/components/schemas/Room'
        - type: object
          properties:
            stats:
              type: object
              properties:
                equipmentCount: { type: integer }
                activeSessionsCount: { type: integer }

    CreateRoomBody:
      type: object
      required: [name, capacity]
      properties:
        roomCode: { type: string, pattern: '^RM-[0-9]{3}$' }
        name: { type: string, minLength: 1, maxLength: 100 }
        roomType: { type: string, maxLength: 50 }
        capacity: { type: integer, minimum: 1, maximum: 1000 }
        description: { type: string, maxLength: 255 }

    UpdateRoomBody:
      type: object
      properties:
        roomCode: { type: string, pattern: '^RM-[0-9]{3}$' }
        name: { type: string, minLength: 1, maxLength: 100 }
        roomType: { type: string, maxLength: 50 }
        capacity: { type: integer, minimum: 1, maximum: 1000 }
        description: { type: string, maxLength: 255 }

    Equipment:
      type: object
      required: [equipmentId, equipmentCode, roomId, name, importDate, status]
      properties:
        equipmentId: { type: string }
        equipmentCode: { type: string, pattern: '^EQ-[0-9]{6}$' }
        roomId: { type: string }
        name: { type: string }
        importDate: { type: string, format: date }
        warrantyUntil: { type: string, format: date }
        status: { $ref: '#/components/schemas/EquipmentStatus' }

    EquipmentDetail:
      allOf:
        - $ref: '#/components/schemas/Equipment'
        - type: object
          properties:
            room:
              type: object
              properties:
                roomCode: { type: string }
                name: { type: string }
            openMaintenance:
              type: object
              nullable: true
              properties:
                maintenanceId: { type: string }
                status: { $ref: '#/components/schemas/MaintenanceStatus' }
                reportedAt: { type: string, format: date-time }
            stats:
              type: object
              properties:
                totalMaintenanceLogs: { type: integer }
                lastResolvedAt: { type: string, format: date-time }

    CreateEquipmentBody:
      type: object
      required: [roomId, name, importDate]
      properties:
        equipmentCode: { type: string, pattern: '^EQ-[0-9]{6}$' }
        roomId: { type: string }
        name: { type: string, minLength: 1, maxLength: 100 }
        importDate: { type: string, format: date }
        warrantyUntil: { type: string, format: date }

    UpdateEquipmentBody:
      type: object
      description: '`status` change block khi có maintenance log open. Không cho phép retired→active.'
      properties:
        equipmentCode: { type: string, pattern: '^EQ-[0-9]{6}$' }
        roomId: { type: string }
        name: { type: string, minLength: 1, maxLength: 100 }
        importDate: { type: string, format: date }
        warrantyUntil: { type: string, format: date }
        status: { $ref: '#/components/schemas/EquipmentStatus' }

    MaintenanceLog:
      type: object
      required: [maintenanceId, equipmentId, description, status, reportedAt]
      properties:
        maintenanceId: { type: string }
        equipmentId: { type: string }
        reportedByStaff:
          type: object
          properties:
            staffId: { type: string }
            staffCode: { type: string }
            fullName: { type: string }
        description: { type: string }
        status: { $ref: '#/components/schemas/MaintenanceStatus' }
        reportedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }

    CreateMaintenanceLogBody:
      type: object
      required: [description]
      properties:
        description: { type: string, minLength: 10, maxLength: 1000 }

  responses:
    Unauthorized:
      description: JWT thiếu / sai / expired
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example: { success: false, code: UNAUTHORIZED, message: Token không hợp lệ }
    Forbidden:
      description: RolesGuard / OwnershipGuard reject
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example: { success: false, code: FORBIDDEN, message: Không có quyền truy cập }
    NotFound:
      description: Resource không tồn tại / soft-deleted
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example: { success: false, code: NOT_FOUND, message: Không tìm thấy bản ghi yêu cầu }
    Conflict:
      description: Trùng giá trị UNIQUE / state conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example: { success: false, code: DUPLICATE_VALUE, message: 'Giá trị đã tồn tại: email' }
    ValidationError:
      description: Body / query / param sai format
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example:
            success: false
            code: VALIDATION_ERROR
            message: Dữ liệu không hợp lệ
            details: [email phải hợp lệ, password tối thiểu 8 ký tự]
    RateLimit:
      description: Quá rate limit (silently 200 OK với forgot-password anti-enumeration; endpoint khác trả 429)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
          example:
            success: false
            code: RATE_LIMIT_EXCEEDED
            message: 'Quá giới hạn yêu cầu, thử lại sau'
