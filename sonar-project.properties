sonar.projectName=Gym Management System
sonar.sourceEncoding=UTF-8

# Project identifiers are supplied by GitHub Variables in CI:
# SONAR_PROJECT_KEY and SONAR_ORGANIZATION.
sonar.sources=client/src,server/src,server/prisma
sonar.tests=server/src
sonar.test.inclusions=server/src/**/*.spec.ts

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/.next/**,server/src/**/*.spec.ts,client/src/styles/generated.css,client/src/vite-env.d.ts
sonar.coverage.exclusions=**/*.spec.ts,**/*.d.ts,client/src/styles/generated.css

sonar.javascript.lcov.reportPaths=server/coverage/lcov.info
sonar.typescript.tsconfigPaths=client/tsconfig.json,server/tsconfig.json,server/prisma/tsconfig.json
sonar.qualitygate.wait=true
